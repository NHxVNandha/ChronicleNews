</span>

<script>
        const settingsBtn = document.getElementById('open-settings');
        const settingsSheet = document.getElementById('settings-sheet');
        const backdrop = document.getElementById('settings-backdrop');
        const closeBtn = document.getElementById('close-settings');

        function toggleSettings(show) {
            if (show) {
                backdrop.classList.remove('hidden');
                setTimeout(() => {
                    backdrop.classList.add('opacity-100');
                    settingsSheet.classList.add('open');
                }, 10);
            } else {
                backdrop.classList.remove('opacity-100');
                settingsSheet.classList.remove('open');
                setTimeout(() => {
                    backdrop.classList.add('hidden');
                }, 300);
            }
        }

        settingsBtn.addEventListener('click', () => toggleSettings(true));
        backdrop.addEventListener('click', () => toggleSettings(false));
        closeBtn.addEventListener('click', () => toggleSettings(false));

        // Interaction for Toggles
        document.querySelectorAll('.relative.flex.items-center.px-1').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const dot = this.querySelector('.w-4');
                const isOff = dot.classList.contains('translate-x-0');
                
                if(isOff) {
                    dot.classList.replace('translate-x-0', 'translate-x-6');
                    this.classList.replace('bg-outline-variant', 'bg-secondary');
                } else {
                    dot.classList.replace('translate-x-6', 'translate-x-0');
                    this.classList.replace('bg-secondary', 'bg-outline-variant');
                }
            });
        });

        // Editor focus highlight
        const editor = document.querySelector('[contenteditable="true"]');
        editor.addEventListener('focus', () => {
            // Optional visual feedback
        });
    </script>
